services:
  - type: web
    name: render-voice-agent
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .

    envVars:
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: CARTESIA_API_KEY
        sync: false
      - key: RENDER_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_REPO_URL
        sync: false
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: PORT
        value: "8765"
      - key: TARGET_REPO_PATH
        value: /app/target-repo
      - key: VOICE_MODEL
        value: claude-sonnet-4-5-20250929
      - key: REDIS_URL
        fromService:
          type: redis
          name: render-voice-agent-redis
          property: connectionString
      - key: OWNER_PHONE
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: render-voice-agent-db
          property: connectionString

    healthCheckPath: /health

    scaling:
      minInstances: 1
      maxInstances: 3
      targetMemoryPercent: 80
      targetCPUPercent: 80

  # Background worker for proactive features
  - type: worker
    name: render-voice-agent-worker
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .

    envVars:
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: RENDER_API_KEY
        sync: false
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: REDIS_URL
        fromService:
          type: redis
          name: render-voice-agent-redis
          property: connectionString
      - key: OWNER_PHONE
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: render-voice-agent-db
          property: connectionString

    dockerCommand: python -m arq src.tasks.worker.WorkerSettings

databases:
  - name: render-voice-agent-redis
    type: redis
    plan: free
    maxmemoryPolicy: allkeys-lru

  - name: render-voice-agent-db
    databaseName: voice_agent
    plan: free
